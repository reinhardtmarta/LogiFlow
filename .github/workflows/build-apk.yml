name: Build LogiFlow Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android project (if android/ folder is missing)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ folder not found. Running flutter create..."
            flutter create . --platforms android
          fi

      # NOVA ETAPA: Garante que a permissão de internet existirá no build
      - name: Injetar permissão de Internet no AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Insere a tag de permissão logo após a abertura da tag <manifest>
            sed -i '|<manifest[^>]*>|a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_PATH"
            echo "✅ Permissão de internet injetada com sucesso!"
          else
            echo "❌ Arquivo AndroidManifest.xml não encontrado para modificação."
          fi

       Sirva-se de Build Release APK
        env:
          MINHA_CHAVE_API: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$MINHA_CHAVE_API \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk LogiFlow-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogiFlow-Android-APK
          path: LogiFlow-v${{ github.run_number }}.apk
          retention-days: 90
