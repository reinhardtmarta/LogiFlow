name: Build LogiFlow Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Clean Gradle and Build Cache
        run: |
          flutter clean
          rm -rf android/.gradle android/app/build build

      - name: Force Android v2 Embedding
        run: |
          # Cria ou sobrescreve MainActivity.kt com v2
          mkdir -p android/app/src/main/kotlin/com/logiflow

          cat > android/app/src/main/kotlin/com/logiflow/MainActivity.kt << 'EOF'
          package com.logiflow

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity : FlutterActivity() {
          }
          EOF

          # Remove qualquer referência antiga v1
          sed -i '/flutterEmbedding.*1/d' android/app/src/main/AndroidManifest.xml || true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Clean project
        run: flutter clean

      - name: Criar .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android project (if android/ folder is missing)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ folder not found. Running flutter create..."
            flutter create . --platforms android
          fi

      - name: Injetar permissão de Internet no AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's|<manifest[^>]*>|&\n    <uses-permission android:name="android.permission.INTERNET" />|' "$MANIFEST_PATH"
            echo "✅ Permissão de internet injetada com sucesso!"
          else
            echo "❌ Arquivo AndroidManifest.xml não encontrado para modificação."
          fi

      - name: Build Release APK
        env:
          MINHA_CHAVE_API: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$MINHA_CHAVE_API \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk LogiFlow-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogiFlow-Android-APK
          path: LogiFlow-v${{ github.run_number }}.apk
          retention-days: 90
