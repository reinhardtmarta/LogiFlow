jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'      # ← Versão que ainda suporta v1 (temporário)
          channel: 'stable'
          cache: true

      - name: Regenerate Android folder (force v2)
        run: |
          flutter clean
          rm -rf android
          flutter create . --platforms=android
          echo "✅ Android project regenerated with v2 embedding"

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Criar .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Injetar permissão de Internet
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's|<manifest[^>]*>|&\n    <uses-permission android:name="android.permission.INTERNET" />|' "$MANIFEST_PATH"
            echo "✅ Permissão injetada"
          fi

      - name: Build Release APK
        env:
          MINHA_CHAVE_API: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$MINHA_CHAVE_API \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk LogiFlow-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogiFlow-Android-APK
          path: LogiFlow-v${{ github.run_number }}.apk
          retention-days: 90
