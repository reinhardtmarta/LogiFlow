name: Build LogiFlow Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android project (if android/ folder is missing)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ folder not found. Running flutter create..."
            flutter create . --platforms android
          fi

      - name: Build Release APK
        run: flutter build apk --release --dart-define=OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk LogiFlow-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogiFlow-Android-APK
          path: LogiFlow-v${{ github.run_number }}.apk
          retention-days: 90
